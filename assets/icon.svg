<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Gradient for the background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <!-- Gradient for the microphone -->
    <linearGradient id="micGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
  </defs>

  <!-- Background with gradient -->
  <rect width="1024" height="1024" fill="url(#bgGradient)"/>

  <!-- Sound wave rings -->
  <circle cx="512" cy="512" r="360" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="10"/>
  <circle cx="512" cy="512" r="280" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="10"/>

  <!-- Microphone body -->
  <rect x="424" y="240" width="176" height="296" rx="88" fill="url(#micGradient)"/>

  <!-- Microphone grille lines -->
  <line x1="472" y1="288" x2="472" y2="488" stroke="#c7d2fe" stroke-width="10" stroke-linecap="round"/>
  <line x1="512" y1="268" x2="512" y2="508" stroke="#c7d2fe" stroke-width="10" stroke-linecap="round"/>
  <line x1="552" y1="288" x2="552" y2="488" stroke="#c7d2fe" stroke-width="10" stroke-linecap="round"/>

  <!-- Microphone stand/base -->
  <path d="M 344 488 Q 344 576 512 576 Q 680 576 680 488" fill="none" stroke="white" stroke-width="24" stroke-linecap="round"/>
  <line x1="512" y1="576" x2="512" y2="680" stroke="white" stroke-width="24" stroke-linecap="round"/>
  <line x1="440" y1="680" x2="584" y2="680" stroke="white" stroke-width="24" stroke-linecap="round"/>

  <!-- AI sparkles -->
  <circle cx="740" cy="288" r="28" fill="#fbbf24"/>
  <circle cx="790" cy="356" r="18" fill="#f59e0b" opacity="0.8"/>
</svg>
