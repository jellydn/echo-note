<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Gradient for the background circle -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <!-- Gradient for the microphone -->
    <linearGradient id="micGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6366f1" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle with gradient -->
  <circle cx="100" cy="100" r="90" fill="url(#bgGradient)" filter="url(#shadow)"/>

  <!-- Sound wave rings (subtle background element) -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <circle cx="100" cy="100" r="55" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

  <!-- Microphone body -->
  <rect x="82" y="45" width="36" height="60" rx="18" fill="url(#micGradient)"/>

  <!-- Microphone grille lines -->
  <line x1="92" y1="55" x2="92" y2="95" stroke="#c7d2fe" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="50" x2="100" y2="100" stroke="#c7d2fe" stroke-width="2" stroke-linecap="round"/>
  <line x1="108" y1="55" x2="108" y2="95" stroke="#c7d2fe" stroke-width="2" stroke-linecap="round"/>

  <!-- Microphone stand/base -->
  <path d="M 70 95 Q 70 115 100 115 Q 130 115 130 95" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="100" y1="115" x2="100" y2="135" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="85" y1="135" x2="115" y2="135" stroke="white" stroke-width="5" stroke-linecap="round"/>

  <!-- Small sparkle/dot indicating AI/processing -->
  <circle cx="145" cy="55" r="6" fill="#fbbf24"/>
  <circle cx="155" cy="70" r="4" fill="#f59e0b" opacity="0.8"/>
</svg>
